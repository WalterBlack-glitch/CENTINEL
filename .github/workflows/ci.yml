name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Instalar (solo extras de test — 0 deps obligatorias)
        run: pip install -e ".[test]"
      - name: Compilar todo el paquete
        run: python -m compileall -q centinel
      - name: Tests
        run: pytest -q

  extras:
    # La suite también debe pasar con TODOS los extras instalados
    # (rich/scapy/fastapi cambian ramas de código en presentación/sniffer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar con extras completos
        run: pip install -e ".[all,test]"
      - name: Tests
        run: pytest -q
